  <rect x="610" y="234" width="52" height="18" rx="2" fill="none" stroke="#333" stroke-width="0.75"/>
  <text x="636" y="246" font-family="'Courier New', monospace" font-size="9" fill="#999" text-anchor="middle">React</text>

  <rect x="670" y="234" width="52" height="18" rx="2" fill="none" stroke="#333" stroke-width="0.75"/>
  <text x="696" y="246" font-family="'Courier New', monospace" font-size="9" fill="#999" text-anchor="middle">Next.js</text>

  <rect x="730" y="234" width="52" height="18" rx="2" fill="none" stroke="#333" stroke-width="0.75"/>
  <text x="756" y="246" font-family="'Courier New', monospace" font-size="9" fill="#999" text-anchor="middle">ESP32</text>

  <rect x="610" y="260" width="68" height="18" rx="2" fill="none" stroke="#333" stroke-width="0.75"/>
  <text x="644" y="272" font-family="'Courier New', monospace" font-size="9" fill="#999" text-anchor="middle">Tailwind</text>

  <rect x="686" y="260" width="52" height="18" rx="2" fill="none" stroke="#333" stroke-width="0.75"/>
  <text x="712" y="272" font-family="'Courier New', monospace" font-size="9" fill="#999" text-anchor="middle">n8n</text>

  <rect x="746" y="260" width="68" height="18" rx="2" fill="none" stroke="#333" stroke-width="0.75"/>
  <text x="780" y="272" font-family="'Courier New', monospace" font-size="9" fill="#999" text-anchor="middle">Supabase</text>

  <!-- Bottom tagline -->
  <text x="50" y="290" font-family="'Courier New', monospace" font-size="9" fill="#444" letter-spacing="2">> always learning, always building_</text>

  <!-- Issue/vol number top right -->
  <text x="820" y="54" font-family="'Courier New', monospace" font-size="9" fill="#444" text-anchor="end" letter-spacing="1">VOL.01 / 2026</text>
</svg>
