<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" width="860" height="320">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="860" height="320" fill="#0d0d0d"/>
  <rect width="860" height="320" fill="url(#grid)" opacity="0.4"/>

  <!-- Grain overlay -->
  <rect width="860" height="320" filter="url(#grain)" opacity="0.06" fill="#fff"/>

  <!-- Left vertical rule -->
  <line x1="30" y1="24" x2="30" y2="296" stroke="#3a3a3a" stroke-width="0.75"/>

  <!-- Top horizontal rule -->
  <line x1="30" y1="24" x2="830" y2="24" stroke="#3a3a3a" stroke-width="0.75"/>

  <!-- Bottom horizontal rule -->
  <line x1="30" y1="296" x2="830" y2="296" stroke="#3a3a3a" stroke-width="0.75"/>

  <!-- Right vertical rule -->
  <line x1="830" y1="24" x2="830" y2="296" stroke="#3a3a3a" stroke-width="0.75"/>

  <!-- Corner ticks -->
  <line x1="30" y1="24" x2="18" y2="24" stroke="#555" stroke-width="0.75"/>
  <line x1="30" y1="24" x2="30" y2="12" stroke="#555" stroke-width="0.75"/>
  <line x1="830" y1="24" x2="842" y2="24" stroke="#555" stroke-width="0.75"/>
  <line x1="830" y1="24" x2="830" y2="12" stroke="#555" stroke-width="0.75"/>
  <line x1="30" y1="296" x2="18" y2="296" stroke="#555" stroke-width="0.75"/>
  <line x1="30" y1="296" x2="30" y2="308" stroke="#555" stroke-width="0.75"/>
  <line x1="830" y1="296" x2="842" y2="296" stroke="#555" stroke-width="0.75"/>
  <line x1="830" y1="296" x2="830" y2="308" stroke="#555" stroke-width="0.75"/>

  <!-- Column divider (right section) -->
  <line x1="590" y1="24" x2="590" y2="296" stroke="#2a2a2a" stroke-width="0.75"/>

  <!-- Eyebrow label -->
  <text x="50" y="54" font-family="'Courier New', monospace" font-size="9" fill="#555" letter-spacing="3">README.md — YUVARAJ-7-HY</text>

  <!-- Headline -->
  <text x="50" y="122" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" fill="#f0ece4" letter-spacing="-2">I BUILD</text>
  <text x="50" y="195" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" fill="#f0ece4" letter-spacing="-2">DIGITAL</text>
  <text x="50" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" fill="#f0ece4" letter-spacing="-2">EXPERIENCES.</text>

  <!-- Right panel — status pill -->
  <rect x="610" y="44" width="140" height="22" rx="11" fill="none" stroke="#2e6b3e" stroke-width="1"/>
  <circle cx="624" cy="55" r="4" fill="#3ecf6e"/>
  <text x="634" y="59" font-family="'Courier New', monospace" font-size="10" fill="#3ecf6e" letter-spacing="1">AVAILABLE</text>

  <!-- Right panel — descriptor block -->
  <text x="610" y="110" font-family="Georgia, serif" font-size="12" fill="#888" letter-spacing="0.5">FOCUSED ON</text>
  <text x="610" y="132" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#f0ece4">Clean code.</text>
  <text x="610" y="155" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#f0ece4">Thoughtful design.</text>
  <text x="610" y="178" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#f0ece4">Real problems.</text>

  <!-- Divider in right panel -->
